dataset:
  _target_: data_module.FSDataset

train:
  filelist: backbones/data/librispeech_train.txt
  batch_size: 64
  shuffle: true

val:
  filelist: backbones/data/librispeech_test.txt
  batch_size: 8
  shuffle: false

test:
  filelist: backbones/data/librispeech_test.txt
  batch_size: 1
  shuffle: false

padding_idx: 0
frame_length: 200
min_audio_length: 16000
